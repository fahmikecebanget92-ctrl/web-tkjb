<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zyfienk.site.je | Class Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-color: #3d243a;
            --text-muted: #7a5c75;
            --accent-pink: #fa709a;
            --accent-purple: #6c5ce7;
            --accent-green: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            padding: 30px 4%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(61, 36, 58, 0.3);
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        .login-container {
            max-width: 450px;
            text-align: center;
            padding: 40px 30px;
        }

        /* --- DASHBOARD HEADER --- */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            border-bottom: 2px dashed rgba(61, 36, 58, 0.15);
            padding-bottom: 20px;
        }

        .dashboard-header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.2rem;
            color: var(--text-color);
        }

        /* --- SCREEN CONTROLLER --- */
        .view-section {
            display: none;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        .view-section.active {
            display: block;
        }

        /* --- TABS NAVIGATION --- */
        .tabs-nav {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: 2px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-color);
            transition: 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--text-color);
            color: #fff;
        }

        .sub-tab-content { display: none; }
        .sub-tab-content.active { display: block; }

        /* --- UTILITIES & INPUTS --- */
        .search-box, .input-field {
            padding: 14px 20px;
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            font-size: 0.95rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-color);
            font-weight: 700;
            width: 100%;
        }

        .btn-navigation {
            padding: 14px 28px;
            background: var(--text-color);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-navigation:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* --- TABLE LAYOUT --- */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin: 20px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.25);
        }

        th {
            font-family: 'Fredoka', sans-serif;
            color: var(--text-color);
            padding: 15px;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 2px solid var(--glass-border);
            white-space: nowrap;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-color);
            font-weight: 600;
            white-space: nowrap;
        }

        tr:hover td { background: rgba(255, 255, 255, 0.45); }
        .num-col { text-align: center; font-weight: 700; width: 60px; }
        .name-col { font-weight: 700; min-width: 260px; }

        /* --- DROPDOWN ABSEN --- */
        .select-absen {
            padding: 6px 10px;
            font-weight: 700;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            outline: none;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        /* --- CHECKBOX KAS --- */
        .check-item { width: 18px; height: 18px; cursor: pointer; transition: 0.2s; }
        .check-item:hover { transform: scale(1.2); }
        .check-kas { accent-color: var(--accent-green); }

        .table-responsive::-webkit-scrollbar { height: 10px; }
        .table-responsive::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        .table-responsive::-webkit-scrollbar-thumb { background: rgba(250, 112, 154, 0.4); border-radius: 10px; }

        footer {
            position: relative; z-index: 2; text-align: center;
            padding: 20px 0 10px 0; color: #fff; font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3); width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- ================= HALAMAN 1: GERBANG LOG IN SECURITY ================= -->
    <div id="screen-login" class="main-container login-container view-section active">
        <h1 style="font-family: 'Fredoka', sans-serif; color: var(--text-color); margin-bottom: 10px;">zyfienk.site.je 🌅</h1>
        <p style="color: var(--text-muted); font-weight: 700; margin-bottom: 25px; font-size: 0.95rem;">Protected Private Ledger System</p>
        
        <div style="margin-bottom: 12px;">
            <input type="text" id="loginNameInput" class="input-field" placeholder="Nama Lengkap / Panggilan..." style="text-align: center;">
        </div>
        <div style="margin-bottom: 25px;">
            <input type="password" id="loginPasswordInput" class="input-field" placeholder="Masukkan Password Anda..." style="text-align: center;">
        </div>
        
        <button class="btn-navigation" onclick="verifyAndLogin()" style="width: 100%;">Masuk Otentikasi Klasifikasi ➔</button>
    </div>

    <!-- ================= HALAMAN 2: MAIN DASHBOARD ================= -->
    <div id="screen-dashboard" class="main-container view-section">
        <div class="dashboard-header">
            <div>
                <h1>Class Management Console 📑</h1>
                <p style="font-size:0.9rem; color:var(--text-muted); font-weight:700; margin-top:3px;">
                    User: <span id="userBadge" style="color:var(--accent-purple); text-transform: capitalize;">Nama</span> 
                    [<span id="roleBadge" style="color:var(--accent-pink); font-weight: 800;">Jabatan</span>] 🔑
                </p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <div class="tabs-nav">
                    <button id="btn-tab-absen" class="tab-btn active" onclick="switchDashboardTab('absen')">📅 1. Absensi Kelas (P1-P16)</button>
                    <button id="btn-tab-kas" class="tab-btn" onclick="switchDashboardTab('kas')">💰 2. Buku Uang Kas 🔒</button>
                </div>
                <input type="text" id="searchBar" class="search-box" placeholder="Cari nama siswa..." onkeyup="filterSiswa()" style="width: 180px; padding: 10px 15px;">
            </div>
        </div>

        <!-- MENU 1: ABSENSI -->
        <div id="sub-absen" class="sub-tab-content active">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr id="absenHeaderRow">
                            <th style="text-align: center;">No</th>
                            <th>Nama Siswa</th>
                        </tr>
                    </thead>
                    <tbody id="absenTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- MENU 2: UANG KAS (12 BULAN) -->
        <div id="sub-kas" class="sub-tab-content">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr id="kasHeaderRow">
                            <th style="text-align: center;">No</th>
                            <th>Nama Siswa</th>
                        </tr>
                    </thead>
                    <tbody id="kasTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- FOOTER KONSOL -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <button class="btn-navigation" style="background: rgba(255,255,255,0.4); color: var(--text-color); border:2px solid var(--glass-border);" onclick="logout()">Logout Keluar ⬅</button>
            <span style="font-weight: 700; color: var(--text-muted);" id="totalSiswaBadge">Total: 37 Siswa</span>
        </div>
    </div>

    <footer>
        <p>zyfienk.site.je &copy; 2026 | Encrypted Class Ledger Ecosystem</p>
    </footer>

    <!-- INTERACTIVE SECURITY CORE LOGIC -->
    <script>
        // Daftar 37 Murid Utama di Absen
        const students = [
            "ADELIA SALSABILAH", "ADITYA AL FARIDZI", "AHMAD SAUQI AZZAM", "AINNA UMAYIRO", 
            "AISYAH NUR DIANA", "ALISYAH SAHRA HASIBUAN", "ANANDA ZYVANO IMMANUEL", "ANGGRA RESTU AJI", 
            "ASSYIFA OKTA APRILIA", "ATHIFA NINDYA CETTA", "AZZAHRA PUTRI ADEESYA", "CHELSEA OLIVIA LUMBAN SIANTAR", 
            "CIRA ALLEGRA PUTRI CORNELLIA", "DANTI NUR ISNAINI RAMADHANI", "DEVITA ANJANI", "DINDA ZAQYA", 
            "FITRIANI", "INTAN PUTRI PERMATA SARI", "JIHAN FADILAH", "KHAERANI NADA", 
            "MIA NURUL ZAHRO", "MUAZAM RAFI RIDWANSYAH", "MUHAMMAD ALHAFIDZ", "MUHAMMAD FAHMI IDRIS", 
            "MUHAMMAD FIDAL UBAIDILAH", "MUHAMMAD KAISA TAMAMIL FADLI", "MUHAMMAD VRADINO", "NASYWAN FAIQ RAMADHAN", 
            "NUR SARIFAH RAMANDANI", "RAIHAN MAULANA YUSUF", "RANIA FEBRYANTI", "RASYA NURUL HAFIZA", 
            "ROHMANUR SEPTIANI AZHAR", "SALSABILA GHINA RAHMANI", "SITA APRILIA PUTRI", "VANESSA KYLA SHARLIZ", 
            "YAYAH KHOIRIA"
        ];

        // Mapping Jabatan Khusus Pengurus Kelas
        const rolesMapping = {
            "MUHAMMAD KAISA TAMAMIL FADLI": "Ketua Kelas 👨‍✈️",
            "MUAZAM RAFI RIDWANSYAH": "Wakil Ketua Kelas 👨‍💻",
            "KHAERANI NADA": "Sekretaris 1 ✍️",
            "VANESSA KYLA SHARLIZ": "Sekretaris 2 ✍️",
            "ADELIA SALSABILAH": "Bendahara 1 💵",
            "ATHIFA NINDYA CETTA": "Bendahara 2 💵",
            "AZZAHRA PUTRI ADEESYA": "Keamanan 1 🛡️",
            "RAIHAN MAULANA YUSUF": "Keamanan 2 🛡️",
            "SALSABILA GHINA RAHMANI": "Keagamaan 1 🌙",
            "AHMAD SAUQI AZZAM": "Keagamaan 2 🌙",
            "JIHAN FADILAH": "Kebersihan 1 🧹",
            "DINDA ZAQYA": "Kebersihan 2 🧹"
        };

        // Panggilan Pengurus & Hak Akses Nama Pendek
        const nicknames = {
            "FADLI": "MUHAMMAD KAISA TAMAMIL FADLI",
            "RAPI": "MUAZAM RAFI RIDWANSYAH",
            "NADA": "KHAERANI NADA",
            "KAYE": "VANESSA KYLA SHARLIZ",
            "ADEL": "ADELIA SALSABILAH",
            "TATA": "ATHIFA NINDYA CETTA",
            "JARA": "AZZAHRA PUTRI ADEESYA",
            "RAIHAN": "RAIHAN MAULANA YUSUF",
            "BILA": "SALSABILA GHINA RAHMANI",
            "AZAM": "AHMAD SAUQI AZZAM",
            "JIHAN": "JIHAN FADILAH",
            "DINDA": "DINDA ZAQYA",
            "FAHMI": "MUHAMMAD FAHMI IDRIS"
        };

        // DATABASE ENKRIPSI PASSWORD SISWA (Ganti valuenya di sini sesuai keinginan anak-anak)
        const studentPasswords = {
            "DESIANA": "walastkjb",
            "ADELIA SALSABILAH": "adel123",
            "ADITYA AL FARIDZI": "adit123",
            "AHMAD SAUQI AZZAM": "azam123",
            "AINNA UMAYIRO": "ainna123",
            "AISYAH NUR DIANA": "aisyah123",
            "ALISYAH SAHRA HASIBUAN": "alisyah123",
            "ANANDA ZYVANO IMMANUEL": "zyvano123",
            "ANGGRA RESTU AJI": "anggra123",
            "ASSYIFA OKTA APRILIA": "assyifa123",
            "ATHIFA NINDYA CETTA": "tata123",
            "AZZAHRA PUTRI ADEESYA": "jara123",
            "CHELSEA OLIVIA LUMBAN SIANTAR": "chelsea123",
            "CIRA ALLEGRA PUTRI CORNELLIA": "cira123",
            "DANTI NUR ISNAINI RAMADHANI": "danti123",
            "DEVITA ANJANI": "devita123",
            "DINDA ZAQYA": "dinda123",
            "FITRIANI": "fitri123",
            "INTAN PUTRI PERMATA SARI": "intan123",
            "JIHAN FADILAH": "jihan123",
            "KHAERANI NADA": "nada123",
            "MIA NURUL ZAHRO": "mia123",
            "MUAZAM RAFI RIDWANSYAH": "rafi123",
            "MUHAMMAD ALHAFIDZ": "alhafidz123",
            "MUHAMMAD FAHMI IDRIS": "fahmi123",
            "MUHAMMAD FIDAL UBAIDILAH": "fidal123",
            "MUHAMMAD KAISA TAMAMIL FADLI": "fadli123",
            "MUHAMMAD VRADINO": "vradino123",
            "NASYWAN FAIQ RAMADHAN": "nasywan123",
            "NUR SARIFAH RAMANDANI": "nur123",
            "RAIHAN MAULANA YUSUF": "raihan123",
            "RANIA FEBRYANTI": "rania123",
            "RASYA NURUL HAFIZA": "rasya123",
            "ROHMANUR SEPTIANI AZHAR": "septi123",
            "SALSABILA GHINA RAHMANI": "bila123",
            "SITA APRILIA PUTRI": "sita123",
            "VANESSA KYLA SHARLIZ": "kaye123",
            "YAYAH KHOIRIA": "yayah123"
        };

        let currentUser = ""; 
        let attendanceData = JSON.parse(localStorage.getItem('zf_attendance')) || {};
        let kasData = JSON.parse(localStorage.getItem('zf_kas')) || {};

        window.onload = function() {
            generateHeaders();
            document.getElementById('totalSiswaBadge').innerText = `Total: ${students.length} Siswa`;
        };

        function saveData() {
            localStorage.setItem('zf_attendance', JSON.stringify(attendanceData));
            localStorage.setItem('zf_kas', JSON.stringify(kasData));
        }

        function verifyAndLogin() {
            const inputName = document.getElementById('loginNameInput').value.trim().toUpperCase();
            const inputPassword = document.getElementById('loginPasswordInput').value.trim();
            
            if(inputName === "" || inputPassword === "") {
                alert("Masukkan Nama DAN Password kamu dengan benar!");
                return;
            }

            let isAllowed = false;
            let displayRole = "Siswa Kelas 🎒";
            let displayName = inputName;
            let targetFullName = "";

            // Deteksi Akun Berdasarkan Nama / Panggilan
            if (inputName === "DESIANA") {
                targetFullName = "DESIANA";
                displayRole = "Wali Kelas 👑";
            } else if (students.includes(inputName)) {
                targetFullName = inputName;
                displayRole = rolesMapping[inputName] || "Siswa Kelas 🎒";
            } else if (nicknames[inputName]) {
                const fullName = nicknames[inputName];
                if (students.includes(fullName)) {
                    targetFullName = fullName;
                    displayRole = rolesMapping[fullName] || "Siswa Kelas 🎒";
                }
            }

            // Validasi Password Individu Secara Ketat
            if (targetFullName !== "") {
                const correctPassword = studentPasswords[targetFullName];
                if (inputPassword === correctPassword) {
                    isAllowed = true;
                    displayName = targetFullName;
                } else {
                    alert("⚠️ PASSWORD SALAH! Hacker dilarang masuk.");
                    return;
                }
            }

            if (isAllowed) {
                currentUser = displayName;
                document.getElementById('userBadge').innerText = displayName.toLowerCase();
                document.getElementById('roleBadge').innerText = displayRole;
                
                changeScreen('screen-dashboard');
                renderAbsensi();
                renderKas();
            } else {
                alert("⚠️ AKSES DITOLAK! Nama tidak dikenali dalam sistem absen.");
            }
        }

        function changeScreen(screenId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'screen-login') {
                document.getElementById('loginNameInput').value = '';
                document.getElementById('loginPasswordInput').value = '';
                currentUser = "";
            }
        }

        function logout() {
            document.getElementById('sub-kas').classList.remove('active');
            document.getElementById('btn-tab-kas').classList.remove('active');
            document.getElementById('sub-absen').classList.add('active');
            document.getElementById('btn-tab-absen').classList.add('active');
            changeScreen('screen-login');
        }

        function switchDashboardTab(type) {
            if (type === 'kas') {
                const inputPassword = prompt("🔐 Masukkan Password Khusus Buku Uang Kas:");
                if (inputPassword !== "tkjbkompak") {
                    alert("⚠️ Password Salah! Akses menuju Buku Uang Kas ditolak.");
                    return;
                }
            }

            document.querySelectorAll('.sub-tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            if(type === 'absen') {
                document.getElementById('sub-absen').classList.add('active');
                document.getElementById('btn-tab-absen').classList.add('active');
            } else {
                document.getElementById('sub-kas').classList.add('active');
                document.getElementById('btn-tab-kas').classList.add('active');
            }
        }

        function generateHeaders() {
            const absenRow = document.getElementById('absenHeaderRow');
            for(let i=1; i<=16; i++) {
                let th = document.createElement('th');
                th.className = 'center-col'; th.style.minWidth = '65px'; th.innerText = `P${i}`;
                absenRow.appendChild(th);
            }

            const kasRow = document.getElementById('kasHeaderRow');
            for(let i=1; i<=12; i++) {
                let th = document.createElement('th');
                th.className = 'center-col'; th.style.minWidth = '95px'; th.innerText = `Bulan ${i}`;
                kasRow.appendChild(th);
            }
        }

        function getAbsenColorStyle(val) {
            if(val === 'H') return 'background-color: #2ecc71; color: white;';
            if(val === 'S') return 'background-color: #f1c40f; color: #3d243a;';
            if(val === 'I') return 'background-color: #3498db; color: white;';
            return 'background-color: rgba(255,255,255,0.4); color: var(--text-color);';
        }

        function renderAbsensi() {
            const tbody = document.getElementById('absenTableBody');
            tbody.innerHTML = '';
            students.forEach((name, index) => {
                if (!attendanceData[name] || !Array.isArray(attendanceData[name])) {
                    attendanceData[name] = Array(16).fill('');
                }
                
                let dropDowns = '';
                for(let i=0; i<16; i++) {
                    let val = attendanceData[name][i];
                    dropDowns += `
                        <td class="center-col">
                            <select class="select-absen" style="${getAbsenColorStyle(val)}" onchange="updateAbsen('${name}', ${i}, this)">
                                <option value="" ${val===''?'selected':''}>-</option>
                                <option value="H" ${val==='H'?'selected':''}>H</option>
                                <option value="S" ${val==='S'?'selected':''}>S</option>
                                <option value="I" ${val==='I'?'selected':''}>I</option>
                            </select>
                        </td>`;
                }
                tbody.innerHTML += `<tr><td class="num-col">${index + 1}</td><td class="name-col">${name}</td>${dropDowns}</tr>`;
            });
        }

        function updateAbsen(name, index, selectElement) {
            const newVal = selectElement.value;
            attendanceData[name][index] = newVal;
            selectElement.style = getAbsenColorStyle(newVal);
            saveData();
        }

        function renderKas() {
            const tbody = document.getElementById('kasTableBody');
            tbody.innerHTML = '';
            students.forEach((name, index) => {
                if (!kasData[name]) kasData[name] = Array(12).fill(false);
                let checkBoxes = '';
                for(let i=0; i<12; i++) {
                    let checked = kasData[name][i] ? 'checked' : '';
                    checkBoxes += `<td class="center-col"><input type="checkbox" class="check-item check-kas" ${checked} onchange="toggleKas('${name}', ${i})"></td>`;
                }
                tbody.innerHTML += `<tr><td class="num-col">${index + 1}</td><td class="name-col">${name}</td>${checkBoxes}</tr>`;
            });
        }

        function toggleKas(name, index) { kasData[name][index] = !kasData[name][index]; saveData(); }

        function filterSiswa() {
            const input = document.getElementById("searchBar").value.toUpperCase();
            const activeTab = document.getElementById("sub-absen").classList.contains("active") ? "absenTableBody" : "kasTableBody";
            
            const tr = document.getElementById(activeTab).getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName("td")[1];
                if (td) {
                    const txtValue = td.textContent || td.innerText;
                    tr[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }
    </script>
</body>
</html>
